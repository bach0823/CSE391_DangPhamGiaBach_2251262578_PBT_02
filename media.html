<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giới thiệu sản phẩm</title>
  </head>
  <body>
    <header>
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle
          cx="50"
          cy="50"
          r="40"
          stroke="green"
          stroke-width="4"
          fill="yellow"
        />
      </svg>
      <h1>Giới Thiệu Sản Phẩm Công Nghệ</h1>
      <nav>
        <ul>
          <li><a href="#intro">Danh sách sản phẩm nổi bật</a></li>
          <li><a href="#intro-vid">Video giới thiệu sản phẩm</a></li>
          <li><a href="#intro-audio">Audio giới thiệu sản phẩm</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="intro">
        <h2>Danh sách sản phẩm nổi bật</h2>

        <figure>
          <img
            src="https://cdn2.cellphones.com.vn/x/media/catalog/product/t/e/text_ng_n_-_2024-09-23t221452.683.png?_gl=1*9emnne*_gcl_aw*R0NMLjE3NzUxMjQxMTkuQ2owS0NRandwN2pPQmhER0FSSXNBQmU3QzRmNHc4OEdFVnpmb2hsbjd3cTQtX2c4NV8tR2tFbGlZVmV0eDUyU3RJT1VUek9VVmwwNWh2Z2FBakF5RUFMd193Y0I.*_gcl_au*NzQ3ODEzNDIwLjE3NzUwMTcyNzg.*_ga*NTAxMzIzMTQ4LjE3NzUwMTcyNzk.*_ga_QLK8WFHNK9*czE3NzY4NDQ2NDAkbzkkZzEkdDE3NzY4NDQ2NjIkajM4JGwwJGg0OTc3NjEzMDA."
            alt=" Laptop ZenBook S14 siêu mỏng nhẹ màu trắng bạc"
            loading="lazy"
            style="width: 300px; max-width: 100%; height: auto"
          />
          <figcaption>Sản phẩm 1: Laptop ZenBook siêu mỏng nhẹ</figcaption>
        </figure>

        <figure>
          <img
            src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/f/r/frame_379_-_2025-05-30t092847.542.png"
            alt="Bàn phím cơ cao cấp siêu nhẹ cực êm"
            loading="lazy"
            style="width: 300px; max-width: 100%; height: auto"
          />
          <figcaption>Sản phẩm 2: Bàn phím cơ Custom cực êm</figcaption>
        </figure>

        <figure>
          <img
            src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/t/_/t_i_xu_ng_36__2.png"
            alt="Mô tả sản phẩm 3"
            loading="lazy"
            style="width: 300px; max-width: 100%; height: auto"
          />
          <figcaption>Sản phẩm 3: Chuột Gaming không dây</figcaption>
        </figure>
      </section>
      <section id="intro-vid">
        <h2>Video giới thiệu sản phẩm công nghệ</h2>

        <figure>
          <video
            controls
            width="640"
            poster="./assets/imgs/thumbnail.jpg"
            preload="metadata"
          >
            <source
              src="./assets/videos/laptop-asus-zenbook-s-14-oled-ux5406.mp4"
              type="video/mp4"
            />
            <source
              src="./assets/videos/laptop-asus-zenbook-s-14-oled-ux5406.webm"
              type="video/webm"
            />
            <p>
              Browser không hỗ trợ video. <a href="review.mp4">Tải video</a>
            </p>
          </video>
          <figcaption>ASUS Zenbook S14 (UX5406)</figcaption>
        </figure>

        <figure>
          <iframe
            width="560"
            height="315"
            src="https://www.youtube.com/embed/_-AS5DtDeqs?si=tMmraCkqYGO_k5nt"
            title="Giới thiệu iPhone 17 Pro"
            frameborder="0"
            allowfullscreen
            loading="lazy"
          ></iframe>
          <figcaption>iPhone 17 Pro</figcaption>
        </figure>
      </section>
      <section id="intro-audio">
        <h2>Audio giới thiệu sản phẩm công nghệ</h2>

        <figure>
          <audio controls>
            <source src="./assets/audios/intro-product.mp3" type="audio/mpeg" />
            <source src="./assets/audios/intro-product.ogg" type="audio/ogg" />
          </audio>
          <figcaption>HUAWEI Pura X Max</figcaption>
        </figure>
      </section>
    </main>
    <footer>
      <p>&copy; 2026</p>
    </footer>
  </body>
</html>
